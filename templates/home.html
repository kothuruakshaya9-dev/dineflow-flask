<!DOCTYPE html>
<html>
<head>
    <title>Royal Spice Hotel</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8b0000, #b22222);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        button {
            padding: 14px 30px;
            font-size: 18px;
            background: white;
            color: #8b0000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #f2f2f2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽 Welcome to Royal Spice Hotel</h1>
    <p>Delicious food · Easy ordering · Fast service</p>

    <a href="/menu">
        <button>View Menu</button>
    </a>
</div>

</body>
</html>
